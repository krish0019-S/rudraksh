<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/login.css">
</head>
<body>
    <main class="login-page">
        <div class="login-content">
            <section class="login-left">
                <h1>
                    Discover what's<br>
                    possible when there is<br>
                    <span>172 layouts</span> ready<br>
                    at your fingertip
                </h1>
                <p>
                    Have the power to build professional<br>
                    websites faster than ever before.
                </p>
            </section>

            <section class="login-card" aria-label="Admin login">
                <form class="login-form" id="loginForm" autocomplete="on">
                    <input type="text" name="username" placeholder="Admin ID" required>
                    <input type="password" name="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                    <p class="login-error" role="alert">Invalid ID or password.</p>
                </form>

                <div class="login-divider">
                    <span>or Log-in with</span>
                </div>

                <div class="login-social">
                    <button type="button" class="social-btn google" aria-label="Sign in with Google">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M21.6 12.2c0-.7-.1-1.3-.2-1.9H12v3.6h5.4a4.6 4.6 0 0 1-2 3v2.5h3.2c1.9-1.7 3-4.3 3-7.2z"></path>
                            <path d="M12 22c2.7 0 4.9-.9 6.6-2.5l-3.2-2.5c-.9.6-2.1 1-3.4 1-2.6 0-4.8-1.8-5.6-4.2H3.1v2.6A10 10 0 0 0 12 22z"></path>
                            <path d="M6.4 13.8a6 6 0 0 1 0-3.6V7.6H3.1a10 10 0 0 0 0 8.8l3.3-2.6z"></path>
                            <path d="M12 6.1c1.5 0 2.8.5 3.9 1.5l2.9-2.9A9.7 9.7 0 0 0 12 2a10 10 0 0 0-8.9 5.6l3.3 2.6C7.2 7.9 9.4 6.1 12 6.1z"></path>
                        </svg>
                        Google
                    </button>
                    <button type="button" class="social-btn facebook" aria-label="Sign in with Facebook">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M15 3h3V0h-3c-3 0-5 2-5 5v2H7v3h3v10h4V10h3l1-3h-4V5c0-1 .5-2 1-2z"></path>
                        </svg>
                        Facebook
                    </button>
                </div>
            </section>
        </div>
    </main>

    <script>
        (function () {
            if (localStorage.getItem("rc_admin_auth") === "1") {
                window.location.replace("/admin.html");
                return;
            }

            var form = document.getElementById("loginForm");
            var error = document.querySelector(".login-error");
            if (!form) {
                return;
            }

            var hideError = function () {
                if (error) {
                    error.classList.remove("is-visible");
                }
            };

            form.addEventListener("input", hideError);
            form.addEventListener("submit", function (event) {
                event.preventDefault();
                var username = form.elements["username"]?.value.trim();
                var password = form.elements["password"]?.value || "";

                if (username === "admin" && password === "admin123") {
                    localStorage.setItem("rc_admin_auth", "1");
                    window.location.href = "/admin.html";
                    return;
                }

                if (error) {
                    error.classList.add("is-visible");
                }
            });
        })();
    </script>
</body>
</html>
